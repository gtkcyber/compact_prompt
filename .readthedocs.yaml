# Read the Docs configuration. https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # setuptools-scm derives the version from git tags; fetch them so the docs
    # show a real version instead of the fallback.
    post_checkout:
      - git fetch --tags --unshallow || true

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
