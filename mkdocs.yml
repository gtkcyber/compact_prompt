site_name: CompactPrompt
site_description: Make the text you send to an AI shorter — without losing the meaning.
site_url: https://compactprompt.readthedocs.io/
repo_url: https://github.com/gtkcyber/compact_prompt
repo_name: gtkcyber/compact_prompt

theme:
  name: material
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
    - search.suggest
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API reference: api-reference.md
