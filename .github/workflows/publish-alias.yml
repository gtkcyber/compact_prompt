name: Publish alias to PyPI

# Publishes the `compact-prompt` alias package (a shim that just installs
# `compactprompt`). Run it manually from the Actions tab — the alias rarely
# changes, so it does not need to publish on every release.
#
# ONE-TIME SETUP (Trusted Publishing for the NEW project name):
#   1. On PyPI, add a pending publisher for project `compact-prompt`:
#        Owner:       gtkcyber
#        Repository:  compact_prompt
#        Workflow:    publish-alias.yml
#        Environment: pypi-alias
#   2. In this repo: Settings -> Environments -> create `pypi-alias`.
# After the first successful run, the pending publisher becomes a normal one.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish the alias
    runs-on: ubuntu-latest
    environment:
      name: pypi-alias
      url: https://pypi.org/p/compact-prompt
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build the alias package
        working-directory: alias/compact-prompt
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: alias/compact-prompt/dist/
