name: Publish to PyPI

# Publishes the package when you push a version tag (e.g. v0.4.0). Uses PyPI
# Trusted Publishing (OIDC) — no API tokens or secrets to manage.
#
# ONE-TIME SETUP (https://docs.pypi.org/trusted-publishers/):
#   1. Register the project name on PyPI (or let the first trusted-publish
#      create it via "pending" publisher).
#   2. On PyPI → project → Settings → Publishing, add a GitHub trusted publisher:
#        Owner:       <your-github-org-or-user>
#        Repository:  compact_prompt
#        Workflow:    publish.yml
#        Environment: pypi
#   3. In this GitHub repo → Settings → Environments, create an environment
#      named "pypi" (optionally add required reviewers to gate releases).
#
# To release:  push a version tag, e.g.
#     git tag v0.4.0 && git push origin v0.4.0
# setuptools-scm derives the package version from the tag (v0.4.0 -> 0.4.0), so
# there is nothing to bump by hand. PyPI rejects re-uploading an existing
# version, so every release needs a new, higher tag.

on:
  push:
    tags:
      - "v*"           # any version tag publishes to PyPI
  workflow_dispatch:   # manual run publishes to TestPyPI (see publish-testpypi)

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # full history + tags so setuptools-scm sees the version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify package metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # A pushed version tag publishes to PyPI.
    if: github.event_name == 'push'
    environment:
      name: pypi
      url: https://pypi.org/p/compactprompt
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    name: Publish to the MCP Registry
    needs: publish-pypi            # the PyPI package must exist first (ownership check)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      id-token: write              # GitHub OIDC auth grants the io.github.* namespace
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Sync server.json version to the tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish

  publish-testpypi:
    name: Publish to TestPyPI (manual dry-run)
    needs: build
    runs-on: ubuntu-latest
    # Manual runs go to TestPyPI so you can rehearse a release safely.
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/compactprompt
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
