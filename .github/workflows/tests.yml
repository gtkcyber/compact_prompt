name: Tests

on:
  push:
  pull_request:

jobs:
  # Fast job: verify the zero-dependency core works on a clean install across
  # every supported Python version. The embedding/clustering tests skip
  # themselves automatically when their optional extras are absent.
  core:
    name: Core (no extras) — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # tags needed for setuptools-scm versioning

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest -v

  # Thorough job: install every optional extra and the spaCy model so the
  # dynamic-scoring, phrase-pruning, quantization, exemplar-selection, and
  # fidelity paths are all exercised end to end.
  full:
    name: Full (all extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # tags needed for setuptools-scm versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all,dev]'
          python -m spacy download en_core_web_sm

      - name: Run full test suite
        run: pytest -v
